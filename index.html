<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
</head>


<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Top Spacer -->
    <div class="head-spacer">
        <div class="container sm-3 "></div>
    </div>


    <!--Navigation Bar(With Tabs)-->
    <nav class="navbar navbar-expand-md bg-black fixed-top">
        <div class="container-fluid">
            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#headerNavigation"
                aria-controls="headerNavigation" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="headerNavigation">
                <ul class="nav nav-tabs  me-auto mb-2 mb-md-0">
                    <li class="nav-item">
                        <a class="navbar-brand nav-link text-light" href="#intro-text">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" href="#search-jifs">Jifs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light" aria-disabled="true" href="#about-text">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>




    <!--Introductory Text-->
    <div class="intro-container mx-auto" id="intro-text">
        <div class="container mx-auto">
            <div class="row justify-content-center align-items-center g-3">
                <div class="col flex-column align-items-center">
                    <div class="description text-start">
                        <!--Heading Text-->
                        <h1>Hi! Welcome to Jify!</h1>
                    </div>
                </div>
                <div class="col d-flex justify-content-center">
                    <!--Image of me or some random free stock image-->
                    <img class="intro-image-border" src="./Images/Jiphy-Knockoff-Logo.png" alt="Jiphy Logo" width="200"
                        height="250">
                </div>
            </div>
        </div>
    </div>

   

    <!--Search Bar and Submit-->
    <div class="jif-container mx-auto" id="search-jifs">
        <div class="container mx-auto">
            <div class="row justify-content-center align-items-center g-3">
                <div class="col flex-column align-items-center">
                    <div class="description text-start">
                        <!--Heading Text-->
                        <h1>Hi! Find gifs here! -- ></h1>
                    </div>
                </div>
                <div class="col d-flex justify-content-center">
                    <form style="display: flex;" action="">
                        <input style="padding-bottom: 5px;" type="text" placeholder="Search Gifs.." name="image-search"
                            id="Search-Bar">
                        <input class="btn btn-secondary" type="submit" value="Search" id="Search-Button">
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!--Row Column Layout for the gifs-->
    <div class="flex-column" id="Row-Column-Layout">
        <div class="row">
            <div class="column"></div>
            <div class="column"></div>
            <div class="column"></div>
            <div class="column"></div>
        </div>
    </div>
    <div style="margin-bottom: 100px;"></div>

     <!--About Text-->
    <div class="about-me-container" id="about-text">
        <div class="container mx-auto">
            <div class="row justify-content-center align-items-center g-3">
                <div class="about-me-column">
                    <div class="col flex-column align-items-center">
                        <div class="description text-start">
                            <!--Heading Text-->
                            <h1>Our mission Statement:</h1>
                            <!--Fake Funny Brand Description-->
                            <p>
                                We at Jiphy aim to inspire and provide our users with gifs of their desires.
                            </p>
                        </div>
                    </div>
                </div>
                <div class="about-me-column">
                    <div class="col d-flex justify-content-center">
                        <!--Image of me or some random free stock image-->
                        <img class=" about-me-image-border" src="../Images/pexels-citronovalimonada-687811.jpg"
                            alt="Jif founder maybe idk" width="300" height="200">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed Bottom Spacer-->
    <div class="fixed-bottom">
        <div class="fixed-footer-bar">
            <div class="container sm-3 ">
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>

</body>


</html>
